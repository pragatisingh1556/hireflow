<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HireFlow - Job Tracker Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- header -->
  <div class="header">
    <div class="header-left">
      <h1>HireFlow</h1>
      <p>Off-Campus Job Application Tracker</p>
    </div>
    <div class="header-right">
      <button id="refreshBtn" class="btn">Refresh</button>
      <button id="exportBtn" class="btn btn-outline">Export CSV</button>
    </div>
  </div>

  <!-- stats cards -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-number" id="totalJobs">0</span>
      <span class="stat-label">Total Jobs</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="newJobs">0</span>
      <span class="stat-label">New</span>
    </div>
    <div class="stat-card stat-applied">
      <span class="stat-number" id="appliedJobs">0</span>
      <span class="stat-label">Applied</span>
    </div>
    <div class="stat-card stat-interview">
      <span class="stat-number" id="interviewJobs">0</span>
      <span class="stat-label">Interview</span>
    </div>
    <div class="stat-card stat-rejected">
      <span class="stat-number" id="rejectedJobs">0</span>
      <span class="stat-label">Rejected</span>
    </div>
  </div>

  <!-- filters -->
  <div class="filter-row">
    <input type="text" id="searchInput" placeholder="search by title, company or location...">

    <select id="sourceFilter">
      <option value="all">All Sources</option>
      <option value="LinkedIn">LinkedIn</option>
      <option value="Naukri">Naukri</option>
      <option value="Indeed">Indeed</option>
      <option value="Internshala">Internshala</option>
    </select>

    <select id="statusFilter">
      <option value="all">All Status</option>
      <option value="new">New</option>
      <option value="applied">Applied</option>
      <option value="interview">Interview</option>
      <option value="rejected">Rejected</option>
    </select>
  </div>

  <!-- job table -->
  <div class="table-container">
    <table id="jobTable">
      <thead>
        <tr>
          <th>Title</th>
          <th>Company</th>
          <th>Location</th>
          <th>Source</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="jobTableBody">
        <!-- jobs will be added here by javascript -->
      </tbody>
    </table>

    <!-- empty state -->
    <div id="emptyState" class="empty-state">
      <h3>No jobs found</h3>
      <p>Run the scraper first: <code>python run_scraper.py</code></p>
      <p>Then refresh this page</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
